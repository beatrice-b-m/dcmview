name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            packaging:
              - ".github/workflows/**"
              - "pyproject.toml"
              - "setup.py"
              - "python/**"
              - "scripts/**"

  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            smoke_binary: target/debug/dcmview
            run_vscode_tests: true
          - runner: windows-latest
            smoke_binary: target/debug/dcmview.exe
            run_vscode_tests: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            vscode/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check package versions
        run: python scripts/check_versions.py
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Check generated frontend API types
        run: npm --prefix frontend run check:types
      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Regenerate committed fixtures
        run: cargo run --example generate_test_fixtures
      - name: Check fixture drift
        run: git diff --exit-code tests/fixtures
      - name: Run Rust tests
        run: cargo test --locked
      - name: Run Python wrapper tests
        run: python -m unittest discover -s python/tests
      - name: Install VS Code extension dependencies
        run: npm --prefix vscode ci
      - name: Compile VS Code extension
        run: npm --prefix vscode run compile
      - name: Run VS Code extension tests
        if: ${{ matrix.run_vscode_tests }}
        run: xvfb-run -a npm --prefix vscode test
      - name: Build debug binary
        run: cargo build --locked
      - name: Smoke test built binary
        run: >
          python scripts/smoke_release_binary.py
          ${{ matrix.smoke_binary }}
          tests/fixtures/golden-uncompressed-u16-multiframe.dcm
          tests/fixtures/golden-no-pixels-sr.dcm

  packaging-smoke:
    needs: changes
    if: needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build manylinux wheel
        run: bash scripts/build_linux_wheel.sh
      - name: Verify wheel name and installed CLI
        run: >
          python scripts/verify_wheel_install.py
          dist
          --expected-platform manylinux_2_28_x86_64
