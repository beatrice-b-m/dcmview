name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            packaging:
              - ".github/workflows/**"
              - "pyproject.toml"
              - "setup.py"
              - "python/**"
              - "scripts/**"

  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check package versions
        run: python scripts/check_versions.py
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate committed fixtures
        run: cargo run --example generate_test_fixtures
      - name: Check fixture drift
        run: git diff --exit-code tests/fixtures
      - name: Run Rust tests
        run: cargo test --locked
      - name: Run Python wrapper tests
        run: python -m unittest python.tests.test_wrapper
      - name: Build debug binary
        run: cargo build --locked
      - name: Smoke test built binary
        run: >
          python scripts/smoke_release_binary.py
          target/debug/dcmview
          tests/fixtures/golden-uncompressed-u16-multiframe.dcm
          tests/fixtures/golden-no-pixels-sr.dcm

  packaging-smoke:
    needs: changes
    if: needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build manylinux wheel
        run: bash scripts/build_linux_wheel.sh
      - name: Verify wheel name and installed CLI
        run: >
          python scripts/verify_wheel_install.py
          "$(find dist -maxdepth 1 -name '*manylinux_2_28_x86_64.whl' | head -n 1)"
          --expected-platform manylinux_2_28_x86_64
