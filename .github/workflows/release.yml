name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  validate-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check release tag matches package versions
        run: python scripts/check_versions.py --tag "${GITHUB_REF_NAME}"

  build:
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            archive_suffix: x86_64-unknown-linux-gnu
            archive_format: tar.gz
            wheel_plat_name: manylinux_2_28_x86_64
            binary_name: dcmview
            archive_binary_name: dcmview
            build_linux_wheel_in_container: true
          - runner: macos-15-intel
            archive_suffix: x86_64-apple-darwin
            archive_format: tar.gz
            wheel_plat_name: macosx_10_13_x86_64
            binary_name: dcmview
            archive_binary_name: dcmview
            macosx_deployment_target: "10.13"
          - runner: macos-14
            archive_suffix: aarch64-apple-darwin
            archive_format: tar.gz
            wheel_plat_name: macosx_11_0_arm64
            binary_name: dcmview
            archive_binary_name: dcmview
            macosx_deployment_target: "11.0"
          - runner: windows-latest
            archive_suffix: x86_64-pc-windows-msvc
            archive_format: zip
            wheel_plat_name: win_amd64
            binary_name: dcmview.exe
            archive_binary_name: dcmview.exe
    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.build_linux_wheel_in_container }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.build_linux_wheel_in_container }}
      - name: Build release binary
        if: ${{ !matrix.build_linux_wheel_in_container }}
        run: cargo build --release --locked
      - name: Build manylinux release binary and wheel
        if: ${{ matrix.build_linux_wheel_in_container }}
        run: bash scripts/build_linux_wheel.sh
      - name: Smoke test built binary
        run: >
          python scripts/smoke_release_binary.py
          target/release/${{ matrix.binary_name }}
          tests/fixtures/golden-uncompressed-u16-multiframe.dcm
          tests/fixtures/golden-no-pixels-sr.dcm
      - name: Build bundled wheel
        if: ${{ !matrix.build_linux_wheel_in_container }}
        env:
          DCMVIEW_PY_BUNDLE_BINARY: ${{ github.workspace }}/target/release/${{ matrix.binary_name }}
          DCMVIEW_PY_WHEEL_PLAT_NAME: ${{ matrix.wheel_plat_name }}
          DCMVIEW_PY_REQUIRE_BUNDLED_BINARY: "1"
        run: |
          python -m pip install build wheel
          python -m build --wheel
      - name: Verify wheel name and installed CLI
        run: >
          python scripts/verify_wheel_install.py
          dist
          --expected-platform ${{ matrix.wheel_plat_name }}
      - name: Package release archive
        run: >
          python scripts/package_release_archive.py
          --version ${{ github.ref_name }}
          --archive-suffix ${{ matrix.archive_suffix }}
          --binary target/release/${{ matrix.binary_name }}
          --binary-name ${{ matrix.archive_binary_name }}
          --format ${{ matrix.archive_format }}
          --out-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive_suffix }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.whl

  validate-linux:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-x86_64-unknown-linux-gnu
          path: artifacts
      - name: Extract linux release archive
        run: |
          mkdir -p extracted
          tar -C extracted -xzf artifacts/dcmview-*.tar.gz
      - name: Smoke test release artifact
        run: >
          python scripts/smoke_release_binary.py
          extracted/dcmview
          tests/fixtures/golden-uncompressed-u16-multiframe.dcm
          tests/fixtures/golden-no-pixels-sr.dcm

  validate-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-x86_64-pc-windows-msvc
          path: artifacts
      - name: Extract Windows release archive
        run: Expand-Archive -Path artifacts/dcmview-*.zip -DestinationPath extracted
      - name: Smoke test Windows release artifact
        run: >
          python scripts/smoke_release_binary.py
          extracted/dcmview.exe
          tests/fixtures/golden-uncompressed-u16-multiframe.dcm
          tests/fixtures/golden-no-pixels-sr.dcm

  package-vscode:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Install VS Code extension dependencies
        run: npm --prefix vscode ci
      - name: Package target-specific VSIX artifacts
        run: npm --prefix vscode run package:release
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: dist/*.vsix

  release:
    needs:
      - build
      - validate-linux
      - validate-windows
      - package-vscode
    runs-on: ubuntu-22.04
    outputs:
      formula_path: ${{ steps.formula.outputs.formula_path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Render Homebrew formula
        id: formula
        env:
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${VERSION#v}"
          ARM_ARCHIVE="dcmview-${VERSION}-aarch64-apple-darwin.tar.gz"
          X86_ARCHIVE="dcmview-${VERSION}-x86_64-apple-darwin.tar.gz"
          ARM_SHA="$(cat "artifacts/release-aarch64-apple-darwin/${ARM_ARCHIVE}.sha256")"
          X86_SHA="$(cat "artifacts/release-x86_64-apple-darwin/${X86_ARCHIVE}.sha256")"
          python scripts/render_homebrew_formula.py \
            --version "$VERSION" \
            --homepage "https://github.com/${REPOSITORY}" \
            --arm-url "https://github.com/${REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ARM_ARCHIVE}" \
            --arm-sha256 "$ARM_SHA" \
            --x86-url "https://github.com/${REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${X86_ARCHIVE}" \
            --x86-sha256 "$X86_SHA" \
            --output packaging/homebrew/dcmview.rb
          echo "formula_path=packaging/homebrew/dcmview.rb" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
            artifacts/**/*.whl
            artifacts/**/*.vsix
            packaging/homebrew/dcmview.rb
      - uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: packaging/homebrew/dcmview.rb

  publish-pypi:
    if: vars.PUBLISH_PYPI == '1'
    needs: release
    runs-on: ubuntu-22.04
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect wheel files
        run: |
          mkdir -p python-dist
          find artifacts -name '*.whl' -exec cp {} python-dist/ \;
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist

  publish-homebrew-tap:
    if: vars.HOMEBREW_TAP_REPOSITORY != ''
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: homebrew-formula
          path: formula
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Publish formula to tap repository
        run: |
          mkdir -p tap/Formula
          cp formula/dcmview.rb tap/Formula/dcmview.rb
          cd tap
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/dcmview.rb
          git commit -m "chore(homebrew): update dcmview formula for ${GITHUB_REF_NAME}" || exit 0
          git push
